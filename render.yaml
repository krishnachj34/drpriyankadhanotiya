services:
  - type: web
    name: dr-priyanka-dhanotiya
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.1"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: WHATSAPP_NUMBER
        value: "919999999999"
      - key: SITE_URL
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
